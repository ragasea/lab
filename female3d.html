<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Anatomical Rotation</title>
    <style>
        :root {
            --skin: #ffdbac;
            --shadow: #e0ac69;
        }

        body {
            background: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            perspective: 1000px;
            font-family: Arial, sans-serif;
        }

        .scene {
            width: 200px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateBody 10s linear infinite;
        }

        @keyframes rotateBody {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* Basic Body Parts as 3D Rectangles */
        .box {
            position: absolute;
            transform-style: preserve-3d;
        }

        /* Head */
        .head {
            width: 40px; height: 50px;
            top: 20px; left: 80px;
            background: var(--skin);
            border-radius: 10px;
        }

        /* Torso (Simplified with chest/hips) */
        .torso {
            width: 70px; height: 120px;
            top: 80px; left: 65px;
            background: var(--skin);
            border: 1px solid var(--shadow);
        }

        /* Anatomical Landmark: Chest */
        .torso::before, .torso::after {
            content: '';
            position: absolute;
            width: 25px; height: 25px;
            background: var(--skin);
            border-radius: 50%;
            top: 20px;
            box-shadow: inset 0 -2px 5px var(--shadow);
        }
        .torso::before { left: 5px; }
        .torso::after { right: 5px; }

        /* Legs */
        .leg {
            width: 25px; height: 180px;
            top: 200px;
            background: var(--skin);
        }
        .leg.left { left: 70px; }
        .leg.right { left: 105px; }

        /* Arms */
        .arm {
            width: 20px; height: 140px;
            top: 85px;
            background: var(--skin);
        }
        .arm.left { left: 40px; }
        .arm.right { left: 140px; }

    </style>
</head>
<body>

    <h2>Medical Study: 360° Proportion Reference</h2>
    <div class="scene">
        <div class="box head"></div>
        <div class="box torso"></div>
        <div class="box arm left"></div>
        <div class="box arm right"></div>
        <div class="box leg left"></div>
        <div class="box leg right"></div>
    </div>
    
    <p>Viewing anatomical proportions (Simulated 3D)</p>

</body>
</html>
